# 本專案的容器化開發環境，包含三個服務：
#   app   — PHP 開發容器（執行 Laravel）
#   db    — MySQL 8（資料庫）
#   redis — Redis 7（快取）
#
# 如需調整 port 或專案名稱，複製 .env.example 為 .env 後修改即可

services:

  # ---- PHP 開發容器 ----
  # 這個容器是開發者的主要工作環境，VS Code 會連進這裡
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${PROJECT_NAME:-laravel-app}-app
    # 等 MySQL 和 Redis 都啟動完成（healthcheck 通過）後，才啟動 app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      # Laravel 環境變數
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: app
      DB_USERNAME: app
      DB_PASSWORD: app
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # 把本機專案目錄掛載到容器內，改了程式碼會即時同步
      # :cached 可以提升 macOS 上的檔案讀取效能（Linux 無影響）
      - .:/workspaces/php-laravel-sample:cached
      # Composer 快取存到獨立的 Docker volume，重建容器時不用重新下載依賴
      - composer_cache:/root/.composer
    # 容器啟動後不會自動跑應用，而是保持待命，等開發者手動執行 php artisan serve
    command: ["sleep", "infinity"]

  # ---- MySQL 8 ----
  db:
    image: mysql:8.0
    container_name: ${PROJECT_NAME:-laravel-app}-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app          # 自動建立名為 app 的資料庫
      MYSQL_USER: app              # 自動建立 app 使用者
      MYSQL_PASSWORD: app          # app 使用者的密碼
      TZ: Asia/Taipei
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      # 資料庫檔案存到 Docker volume，重建容器時資料不會消失
      - mysql_data:/var/lib/mysql
    command: ["--default-authentication-plugin=mysql_native_password"]
    # 每 5 秒檢查一次 MySQL 是否就緒，最多重試 30 次
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-laravel-app}-redis
    environment:
      TZ: Asia/Taipei
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    # 開啟 AOF 持久化＋Keyspace Notification（Ex = expired events），供 Laravel 監聽 key 過期
    command: ["redis-server", "--appendonly", "yes", "--notify-keyspace-events", "Ex"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

# Docker volume 定義 — 資料存在 Docker 管理的磁碟區，不會因為刪除容器而遺失
volumes:
  mysql_data:
    name: ${PROJECT_NAME:-laravel-app}_mysql_data
  redis_data:
    name: ${PROJECT_NAME:-laravel-app}_redis_data
  composer_cache:
    name: ${PROJECT_NAME:-laravel-app}_composer_cache
